name = "galerie-upload"
main = "index.js"
compatibility_date = "2024-09-23"
workers_dev = true

[[r2_buckets]]
binding = "R2_BUCKET"
# Remplace par le nom exact de ton bucket R2 (visible dans Cloudflare Dashboard > R2)
bucket_name = "REMPLACER_PAR_TON_BUCKET_NAME"

[vars]
ALLOWED_ORIGIN = "https://galerie-mariage.vercel.app"
# R2_PUBLIC_URL sera ajouté comme secret (voir instructions)
